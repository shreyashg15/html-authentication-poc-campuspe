<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<!-- Custom CSS -->
<link rel="stylesheet" href="styles.css">

</head>

<body>
<div class="container d-flex justify-content-center align-items-center vh-100">

<div class="card auth-card p-4 w-100" style="max-width:400px;">

<h3 class="text-center mb-3">Create Account</h3>

<form action="index.html" oninput="checkStrength()">

<!-- Name -->
<label class="form-label">Full Name</label>
<input type="text" class="form-control mb-3" required>

<!-- Email -->
<label class="form-label">Email</label>
<input type="email" class="form-control mb-3" required>

<!-- Password -->
<label class="form-label">Password</label>
<div class="input-group mb-2">
<input type="password" id="regPassword" class="form-control" required>
<button type="button" class="btn btn-outline-secondary" onclick="togglePassword('regPassword')">
<i class="bi bi-eye"></i>
</button>
</div>

<!-- Strength Bar -->
<div class="progress mb-3" style="height:6px;">
<div id="strengthBar" class="progress-bar"></div>
</div>

<button class="btn btn-custom w-100">Register</button>

<div class="text-center mt-3">
<a href="index.html" class="auth-link">Already have account?</a>
</div>

</form>

</div>

<script src="script.js"></script>
</div>
</body>
</html>
