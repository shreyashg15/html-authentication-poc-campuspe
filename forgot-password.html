<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
    
<title>Forgot Password</title>


<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<!-- Custom CSS -->
<link rel="stylesheet" href="styles.css">

</head>

<body>
<div class="container d-flex justify-content-center align-items-center vh-100">

<div class="card auth-card p-4 w-100" style="max-width:400px;">

<h3 class="text-center mb-3">Forgot Password</h3>

<form action="reset-password.html">

<!-- Email -->
<label class="form-label">Enter Registered Email</label>
<input type="email" class="form-control mb-3" required>

<button class="btn btn-custom w-100">Send Reset Link</button>

<div class="text-center mt-3">
<a href="index.html" class="auth-link">Back to Login</a>
</div>

</form>

</div>
</div>
</body>
</html>
