<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<!-- Bootstrap + Icons + Fonts + CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

</head>

<body>
<div class="container d-flex justify-content-center align-items-center vh-100">

<div class="card auth-card p-4 w-100" style="max-width:400px;">

<h3 class="text-center mb-3">Login</h3>

<form action="dashboard.html">

<!-- Email -->
<label class="form-label">Email</label>
<input type="email" class="form-control mb-3" required>

<!-- Password -->
<label class="form-label">Password</label>
<div class="input-group mb-3">
<input type="password" id="loginPassword" class="form-control" required>
<button type="button" class="btn btn-outline-secondary" onclick="togglePassword('loginPassword')">
<i class="bi bi-eye"></i>
</button>
</div>

<button class="btn btn-custom w-100">Login</button>

<div class="text-center mt-3">
<a href="forgot-password.html" class="auth-link">Forgot Password?</a><br>
<a href="register.html" class="auth-link">Create Account</a>
</div>

</form>

</div>
</div>
<script src="script.js"></script>
</body>
</html>
