<!DOCTYPE html>
<html>
<head>
<title>Reset Password</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<!-- Custom CSS -->
<link rel="stylesheet" href="styles.css">

</head>

<body>
<div class="container d-flex justify-content-center align-items-center vh-100">

<div class="card auth-card p-4 w-100" style="max-width:400px;">

<h3 class="text-center mb-3">Reset Password</h3>

<form action="index.html" onsubmit="return validateReset()">

<!-- New Password -->
<label class="form-label">New Password</label>
<div class="input-group mb-3">
<input type="password" id="newPass" class="form-control" required>
<button type="button" class="btn btn-outline-secondary" onclick="togglePassword('newPass')">
<i class="bi bi-eye"></i>
</button>
</div>

<!-- Confirm Password -->
<label class="form-label">Confirm Password</label>
<div class="input-group mb-3">
<input type="password" id="confirmPass" class="form-control" required>
<button type="button" class="btn btn-outline-secondary" onclick="togglePassword('confirmPass')">
<i class="bi bi-eye"></i>
</button>
</div>

<button class="btn btn-custom w-100">Update Password</button>

<div class="text-center mt-3">
<a href="index.html" class="auth-link">Back to Login</a>
</div>

</form>

</div>

<script src="script.js"></script>
</div>
</body>
</html>
