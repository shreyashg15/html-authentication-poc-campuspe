<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body class="dashboard-bg">

<!-- ================= NAVBAR START ================= -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

    <div class="container">

        <!-- Logo / Title -->
        <a class="navbar-brand fw-bold">Auth System</a>

        <!-- Mobile Toggle Button -->
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Navbar Content -->
        <div class="collapse navbar-collapse" id="navMenu">

            <!-- Right Side Buttons -->
            <div class="ms-auto mt-3 mt-lg-0">

                <!-- Dark Mode Button -->
                <button class="btn btn-light me-2"
                        onclick="toggleDarkMode()">
                    <i class="bi bi-moon"></i>
                </button>

                <!-- Logout Button -->
                <a href="index.html" class="btn btn-danger">
                    Logout
                </a>

            </div>

        </div>

    </div>

</nav>
<!-- ================= NAVBAR END ================= -->


<!-- ================= DASHBOARD CONTENT ================= -->
<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-lg-8 col-md-10 col-sm-12">

            <!-- Welcome Card -->
            <div class="card auth-card p-5 text-center">

                <h1 class="mb-3">Welcome 🎉</h1>

                <p class="lead">
                    You have successfully logged into the dashboard Created By - Shreyas H G.
                </p>

                <hr>

                <p>
                    This is your professional authentication system UI built using Bootstrap.
                </p>

            </div>

        </div>

    </div>

</div>
<!-- ================= END CONTENT ================= -->


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->
<script src="script.js"></script>

</body>
</html>
